name: Production Deployment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          docker build -t dhaka-pm25-backend:${{ github.sha }} .
          docker tag dhaka-pm25-backend:${{ github.sha }} dhaka-pm25-backend:latest

      # Mock Deployment Step
      - name: Deploy to Kubernetes Cluster
        run: |
          echo "Simulating production deployment..."
          echo "kubectl apply -f infra/k8s/deployment.yaml"
          echo "kubectl apply -f infra/k8s/service.yaml"
          echo "Deployment successful."
