name: Security Pipeline (SAST & DAST)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  sast_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          
      - name: Run Bandit (SAST Code Scanning)
        run: bandit -r backend/ ml/ data/ -ll
        
      - name: Run Safety (Dependency Scanning)
        run: |
          pip freeze > reqs.txt
          safety check -r reqs.txt
