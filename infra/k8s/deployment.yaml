apiVersion: apps/v1
kind: Deployment
metadata:
  name: dhaka-pm25-backend
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dhaka-pm25-backend
  template:
    metadata:
      labels:
        app: dhaka-pm25-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: backend
        image: dhaka-pm25-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: jwt_secret
